<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESG Collaboration Mapping Dashboard</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>ESG Mapping</h2>
    </div>

    <div class="filter-group">
      <label>Dataset</label>
      <select id="datasetToggle">
        <option value="subset">111 Clean Subset</option>
        <option value="full">501 Full Extraction</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Collaboration Type</label>
      <select id="collabFilter">
        <option value="ALL">All</option>
        <option value="BN">BN</option>
        <option value="BG">BG</option>
        <option value="BS">BS</option>
      </select>
    </div>

    <div class="filter-group">
      <label>ESG Block</label>
      <select id="esgFilter">
        <option value="ALL">All</option>
        <option value="E">E</option>
        <option value="S">S</option>
        <option value="G">G</option>
        <option value="X">Cross</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Sector</label>
      <select id="sectorFilter"></select>
    </div>

    <div class="sidebar-footer">
      <button id="resetBtn">Reset</button>
    </div>
  </aside>


  <!-- Main Content -->
  <main class="main">

    <header class="topbar">
      <div>
        <h1 id="title">ESG Collaboration Mapping</h1>
        <p id="subtitle">Chinese Companies • BRICS+ Focus</p>
      </div>

      <div class="top-actions">
        <button id="langToggle">RU</button>
        <button id="darkToggle">🌙</button>
      </div>
    </header>

    <!-- KPI Cards -->
    <section class="kpi-grid">
      <div class="kpi-card">
        <span id="kpiInitiatives">0</span>
        <label>Initiatives</label>
      </div>
      <div class="kpi-card">
        <span id="kpiCompanies">0</span>
        <label>Companies</label>
      </div>
      <div class="kpi-card">
        <span id="kpiBN">0</span>
        <label>BN</label>
      </div>
      <div class="kpi-card">
        <span id="kpiBG">0</span>
        <label>BG</label>
      </div>
      <div class="kpi-card">
        <span id="kpiBS">0</span>
        <label>BS</label>
      </div>
    </section>

    <!-- Charts -->
    <section class="charts-grid">
      <div class="chart-card">
        <h3>Collaboration Distribution</h3>
        <canvas id="collabChart"></canvas>
      </div>

      <div class="chart-card">
        <h3>ESG Block Distribution</h3>
        <canvas id="esgChart"></canvas>
      </div>

      <div class="chart-card full">
        <h3>Top Mechanism Signals</h3>
        <canvas id="mechChart"></canvas>
      </div>
    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
